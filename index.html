<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👾 우리반 퀘스트</title>
    <style>

        @font-face {
            font-family: 'NeoDunggeunGothicPro';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.0/NeoDunggeunmoPro-Regular.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }

        :root {
            --content-font-size: 25px; 
        }

        * {
            box-sizing: border-box;
            font-family: 'NeoDunggeunGothicPro', sans-serif;
        }

        body {
            background-color: #8b5a2b; 
            margin: 0;
            padding: 50px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            overflow: hidden; 
        }

        .grass-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 100px; 
            z-index: -1;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        button, input[type="text"] {
            font-size: 14px; 
            padding: 6px 12px; 
            background-color: #e0e0e0;
            border: 3px solid #000;
            box-shadow: inset -3px -3px 0px rgba(0,0,0,0.2), inset 3px 3px 0px rgba(255,255,255,0.7);
            cursor: pointer;
            outline: none;
            transition: background-color 0.2s;
        }
        button:active {
            box-shadow: inset 3px 3px 0px rgba(0,0,0,0.2);
            padding: 8px 10px 4px 14px;
        }
        
        .btn-fullscreen { background-color: #55ffff; }
        .btn-font { background-color: #ffff55; font-weight: bold; }
        
        .btn-dark { background-color: #888888; color: #ffffff; border: 2px solid #222; font-size: 0.9rem; padding: 4px 8px; box-shadow: inset -2px -2px 0px rgba(0,0,0,0.3), inset 2px 2px 0px rgba(255,255,255,0.2); }
        .btn-dark:hover { background-color: #999999; }

        .container {
            display: flex;
            flex: 1;
            transition: gap 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            min-height: 0; 
            min-width: 0;
        }
        
        .container.split-mode { gap: 20px; }
        .container.notice-mode { gap: 0px; }
        .container.checklist-mode { gap: 0px; }

        .section {
            background-color: #f9f9f9; 
            border: 5px solid #333;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden; 
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            min-height: 0; 
            min-width: 0;  
        }

        .split-mode .section { flex: 1; padding: 15px; border-width: 5px; opacity: 1; }
        .notice-mode .notice-section { flex: 1; padding: 15px; border-width: 5px; opacity: 1; }
        .notice-mode .checklist-section { flex: 0; padding: 0; border-width: 0; margin: 0; opacity: 0; }
        .checklist-mode .checklist-section { flex: 1; padding: 15px; border-width: 5px; opacity: 1; }
        .checklist-mode .notice-section { flex: 0; padding: 0; border-width: 0; margin: 0; opacity: 0; }

        .header-with-btns {
            position: relative; 
            display: flex; justify-content: center; align-items: center;
            border-bottom: 3px solid #ccc; margin-bottom: 10px; padding-bottom: 10px;
        }
        .header-with-btns h2 { border-bottom: none; margin: 0; padding: 0; }
        .header-btns { position: absolute; right: 0; display: flex; gap: 5px; }

        h2 {
            text-align: center; margin: 0 0 10px 0; padding-bottom: 10px;
            border-bottom: 3px solid #ccc; color: #222;
            font-size: 30px;
            white-space: nowrap; 
        }

        .date-display {
            font-weight: normal; text-align: center; margin-bottom: 10px; color: #0000aa;
            font-size: calc(var(--content-font-size) * 1.2); transition: font-size 0.2s ease;
        }

        textarea.notice-content {
            width: 100%; flex: 1; resize: none; background-color: #fff; border: 3px solid #888;
            padding: 15px; line-height: 1.3; font-size: calc(var(--content-font-size) * 1.2);
            transition: font-size 0.2s ease; min-height: 0; 
        }

        .admin-controls {
            margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px;
            align-items: stretch; background: #e9e9e9; padding: 10px; border: 3px solid #888;
        }

        .custom-select-container {
            position: relative; font-size: 1.1rem; user-select: none; z-index: 10;
        }
        
        .custom-select-header {
            background: #fff; border: 3px solid #888; padding: 8px 12px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            height: 4.5rem; box-sizing: border-box;
        }
        .custom-select-header::after { content: '▲'; font-size: 0.8rem; margin-left: 10px; color: #555; flex-shrink: 0; }

        .custom-select-header-text {
            flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis; line-height: 1.4; word-break: keep-all; 
        }
        
        .custom-select-list {
            position: absolute; bottom: calc(100% - 3px); left: 0; right: 0;
            background: #fff; border: 3px solid #888; z-index: 1000; 
            max-height: 250px; overflow-y: auto; box-shadow: 4px -4px 0px rgba(0,0,0,0.2); 
            display: none;
        }
        .custom-select-container.open .custom-select-list { display: block; }
        
        .custom-select-item {
            padding: 10px 12px; border-bottom: 2px dashed #eee; display: flex;
            justify-content: space-between; align-items: center; cursor: pointer; font-size: 1.1rem;
        }
        .custom-select-item:hover { background: #f0f0f0; }
        .custom-select-item span { flex: 1; pointer-events: none; } 
        
        .custom-del-btn, .delete-btn {
            background: none; border: none; box-shadow: none;
            color: #aaaaaa; cursor: pointer; padding: 0 5px; font-size: 1.3rem;
        }
        .custom-del-btn:hover, .delete-btn:hover { color: #888888; transform: scale(1.2); }
        
        .custom-add-btn {
            padding: 12px; text-align: center; color: #0000aa; font-weight: bold; cursor: pointer; font-size: 1.1rem;
            border-top: 2px solid #888; background: #f9f9ff;
        }
        .custom-add-btn:hover { background: #eef; }

        .btn-clear { background-color: #ffaaaa; color: #cc0000; font-weight: bold; }

        .checklist-items { display: flex; flex-direction: column; gap: 10px; flex: 1; min-height: 0; }

        .check-item {
            display: flex; align-items: center; background-color: #fff; border: 3px solid #555;
            padding: 10px; font-size: var(--content-font-size); transition: font-size 0.2s ease; cursor: grab; 
        }
        .check-item:active { cursor: grabbing; } 

        .check-box {
            width: 24px; height: 24px; border: 3px solid #000; background-color: #eee; margin-right: 15px;
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem; color: #ff5555;
            flex-shrink: 0; cursor: pointer; 
        }

        .check-item span {
            flex: 0 1 auto; min-width: 50px; padding: 2px 5px; outline: none; border-bottom: 2px solid transparent; cursor: text;
        }
        .check-item span[contenteditable="true"] {
            border-bottom: 2px dashed #ffaa00; background-color: rgba(0,0,0,0.05);
            text-decoration: none !important; color: #000 !important; cursor: text;
        }

        .delete-btn { margin-left: auto; } 
        .check-item.completed .check-box::after { content: '✔'; }
        .check-item.completed span { text-decoration: line-through; color: #999; }

        .check-item.fixed-end {
            display: block; text-align: center; background-color: #ffaa00; border-color: #aa0000;
            font-weight: normal; color: #fff; text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            margin-top: auto; cursor: default; font-size: calc(var(--content-font-size) * 1.2);
            line-height: 1.4; padding: 15px;
        }
        
        .check-item.fixed-end span { display: inline-block; cursor: text; padding: 5px; border-bottom: 2px solid transparent; min-width: 200px; }
        .check-item.fixed-end span[contenteditable="true"] { border-bottom: 2px dashed #fff; background-color: rgba(0,0,0,0.2); text-shadow: none; color: #fff !important; }

        .add-checklist { display: flex; gap: 5px; margin-bottom: 10px; }
        .add-checklist input { flex: 1; }

        .drag-placeholder { height: 6px; background-color: #888888; border-radius: 3px; margin: 2px 0; pointer-events: none; }

        /* 모달 배경에 Blur(흐림) 효과 추가 */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(5px); 
            display: flex; justify-content: center; align-items: center; z-index: 5000; 
        }
        .modal-box { background: #f9f9f9; border: 5px solid #333; box-shadow: 6px 6px 0px rgba(0,0,0,0.5); padding: 20px; width: 400px; max-width: 90%; text-align: center; display: flex; flex-direction: column; }
        .modal-box h3 { margin-top: 0; font-size: 1.5rem; border-bottom: 3px dashed #ccc; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-box p { font-size: 1.1rem; color: #333; margin-bottom: 15px; line-height: 1.5; white-space: pre-line; }
        .modal-box input { width: 100%; margin-bottom: 20px; font-size: 1.2rem; text-align: center; padding: 10px; border: 3px solid #888; }
        .modal-buttons { display: flex; gap: 10px; margin-top: auto; }
        .modal-buttons button { flex: 1; font-size: 1.2rem; padding: 15px 20px; min-height: 55px; }

        /* 히스토리 모달 전용 스타일 */
        .history-list {
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 15px;
            border: 3px solid #ccc;
            background: #fff;
        }
        .history-item {
            padding: 10px;
            border-bottom: 1px dashed #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item:hover { background: #f0f0f0; }
        .history-date { font-weight: bold; color: #0000aa; font-size: 1.1rem; flex-shrink: 0; }
        .history-preview { color: #555; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-left: 10px; }

        @media (max-width: 768px) { .container { flex-direction: column; } .split-mode .section { width: 100%; flex: 1; } }
    </style>
</head>
<body>

    <div id="customModal" class="modal-overlay" style="display: none; z-index: 6000;">
        <div class="modal-box">
            <h3 id="modalTitle">제목</h3>
            <p id="modalDesc"></p>
            <input type="text" id="modalInput">
            <div class="modal-buttons">
                <button id="modalOkBtn" style="background-color: #e0e0e0;">확인</button>
                <button id="modalCancelBtn" style="background-color: #e0e0e0;">취소</button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3>📂 알림장 불러오기</h3>
            <p style="font-size: 0.9rem; color:#666; margin-top:-5px;">열람할 날짜를 선택하세요.</p>
            <div id="historyList" class="history-list"></div>
            <div class="modal-buttons">
                <button onclick="closeHistoryModal()" style="background-color: #e0e0e0;">닫기</button>
            </div>
        </div>
    </div>

    <div id="viewHistoryModal" class="modal-overlay" style="display: none;">
        <div class="modal-box" style="width: 450px;">
            <h3 id="viewHistoryTitle">0000-00-00 알림장</h3>
            <textarea id="viewHistoryContent" readonly style="width: 100%; height: 180px; margin-bottom: 15px; font-size: 1.1rem; padding: 10px; border: 3px solid #888; resize: none; background: #eee; outline: none;"></textarea>
            <div class="modal-buttons">
                <button id="btnOverwrite" style="background-color: #ffaa00; font-weight: bold; line-height: 1.4;">이 내용으로<br>덮어쓰기</button>
                <button onclick="goBackToHistoryModal()" style="background-color: #e0e0e0;">닫기</button>
            </div>
        </div>
    </div>

    <div class="grass-top"></div>

    <div class="controls">
        <button onclick="setViewMode('split')">📖 둘 다 보기</button>
        <button onclick="setViewMode('notice')">📝 알림장</button>
        <button onclick="setViewMode('checklist')">✅ 체크리스트</button>
        <button id="fullscreenBtn" class="btn-fullscreen" onclick="toggleFullScreen()">🖥️ 전체화면</button>
        <button class="btn-font" onclick="changeFontSize(-2)">-가</button>
        <button class="btn-font" onclick="changeFontSize(2)">+가</button>
        <button onclick="toggleBackground()" style="background-color: #ffb6c1;">🎨</button>
    </div>

    <div class="container split-mode" id="mainContainer">
        <div class="section notice-section">
            <div class="header-with-btns">
                <h2>📢 오늘의 알림장</h2>
                <div class="header-btns">
                    <button class="btn-dark" onclick="saveNoticeHistory()" title="현재 알림장 저장">💾 저장</button>
                    <button class="btn-dark" onclick="openHistoryModal()" title="과거 알림장 열람">📂 불러오기</button>
                </div>
            </div>
            <div class="date-display" id="dateDisplay"></div>
            <textarea class="notice-content" id="noticeText"></textarea>

            <div class="admin-controls">
                <div id="categorySelectContainer" class="custom-select-container" style="flex: 1; min-width: 120px;"></div>
                <div id="itemSelectContainer" class="custom-select-container" style="flex: 2; min-width: 180px;"></div>
                <button onclick="appendNotice()" style="margin-left:auto; padding: 10px 15px;">➕ 덧붙이기</button>
                <button class="btn-clear" onclick="clearNotice()" title="초기화" style="padding: 10px 15px;">초기화</button>
            </div>
        </div>

        <div class="section checklist-section">
            <h2>✅ 확인했나요?</h2>
            <div class="add-checklist">
                <input type="text" id="newCheckInput" placeholder="오늘의 퀘스트 입력" onkeypress="if(event.key==='Enter') addCheckItem()">
                <button onclick="addCheckItem()">➕ 추가</button>
            </div>
            <div class="checklist-items" id="checklistContainer">
                <div class="check-item fixed-end" id="finalCheckItem">
                    <span onclick="enterEditMode(this)" onblur="exitEditMode(this)" onkeydown="preventEnter(event)" spellcheck="false" contenteditable="false">모두 완료한 사람은<br>선생님께 인사 드리고 하교하기!</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generatePixelPattern(colors, pixelSize, size) {
            const canvas = document.createElement('canvas'); canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            for (let y = 0; y < size; y += pixelSize) {
                for (let x = 0; x < size; x += pixelSize) {
                    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                    ctx.fillRect(x, y, pixelSize, pixelSize);
                }
            }
            return canvas.toDataURL(); 
        }

        function generateGrassOverhangPattern(colors, pixelSize, width, height) {
            const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            for (let x = 0; x < width; x += pixelSize) {
                let overhangLimit = (4 + Math.floor(Math.random() * 5)) * pixelSize;
                for (let y = 0; y < overhangLimit; y += pixelSize) {
                    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                    ctx.fillRect(x, y, pixelSize, pixelSize);
                    if (y === overhangLimit - pixelSize) { ctx.fillStyle = 'rgba(0, 0, 0, 0.25)'; ctx.fillRect(x, y, pixelSize, pixelSize); }
                }
            }
            return canvas.toDataURL();
        }

        function generateWaterPattern(pixelSize, height) {
            const width = 3000; 
            const canvas = document.createElement('canvas'); 
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            const oceanColors = [
                '#ffffff', '#e1f5fe', '#b3e5fc', '#81d4fa',
                '#4fc3f7', '#29b6f6', '#03a9f4', '#039be5', 
                '#0288d1', '#0277bd', '#01579b', '#003c8f',
                '#002171', '#00154a', '#000a24'            ];

            for (let y = 0; y < height; y += pixelSize) {
                let ratio = y / height;
                let baseIndex = Math.floor(ratio * oceanColors.length);
                for (let x = 0; x < width; x += pixelSize) {
                    let offset = Math.floor(Math.random() * 5) - 2; 
                    let finalIndex = Math.max(0, Math.min(oceanColors.length - 1, baseIndex + offset));
                    ctx.fillStyle = oceanColors[finalIndex];
                    ctx.fillRect(x, y, pixelSize, pixelSize);
                }
            }
            return canvas.toDataURL();
        }

        function generateBeachWavePattern(pixelSize, width, height) {
            const canvasWidth = 3000; 
            const canvas = document.createElement('canvas'); 
            canvas.width = canvasWidth; canvas.height = height;
            const ctx = canvas.getContext('2d');

            const sandColors = ['#f4d499', '#e8c382', '#e0b876', '#dcb46e', '#d1a75c'];
            const foamColor = '#ffffff'; 

            let randomPhase1 = Math.random() * Math.PI * 2;
            let randomPhase2 = Math.random() * Math.PI * 2;
            let randomPhase3 = Math.random() * Math.PI * 2;

            for (let x = 0; x < canvasWidth; x += pixelSize) {
                let bigWave = Math.sin(x / 113 + randomPhase1) * 20;   
                let midWave = Math.sin(x / 47 + randomPhase2) * 10;    
                let smallWave = Math.sin(x / 19 + randomPhase3) * 4;   
                
                let waveOffset = bigWave + midWave + smallWave; 
                let limit = Math.round((55 + waveOffset) / pixelSize) * pixelSize;

                for (let y = 0; y < limit; y += pixelSize) {
                    if (y === limit - pixelSize) {
                        ctx.fillStyle = foamColor;
                    } else {
                        ctx.fillStyle = sandColors[Math.floor(Math.random() * sandColors.length)];
                    }
                    ctx.fillRect(x, y, pixelSize, pixelSize);
                }
            }
            return canvas.toDataURL();
        }

        let currentBgTheme = 'dirt';
        function applyBackgroundTheme(theme) {
            currentBgTheme = theme;
            const grassTop = document.querySelector('.grass-top');

            if (theme === 'dirt') {
                const greenShades = ['#5b8731', '#6ba038', '#70b23f', '#78c244', '#82d14b', '#527a2c'];
                const brownShades = ['#5c3a21', '#6b4426', '#7a4d2b', '#8b5a32', '#9c6538', '#ad703e'];
                document.body.style.backgroundImage = `url(${generatePixelPattern(brownShades, 10, 400)})`;
                document.body.style.backgroundRepeat = 'repeat';
                document.body.style.backgroundAttachment = 'scroll';
                
                grassTop.style.display = 'block';
                grassTop.style.backgroundImage = `url(${generateGrassOverhangPattern(greenShades, 10, 400, 100)})`;
            } else if (theme === 'water') {
                const screenHeight = Math.max(window.innerHeight, 1000); 
                document.body.style.backgroundImage = `url(${generateWaterPattern(10, screenHeight)})`;
                document.body.style.backgroundRepeat = 'repeat-x'; 
                document.body.style.backgroundAttachment = 'fixed'; 

                grassTop.style.display = 'block'; 
                grassTop.style.backgroundImage = `url(${generateBeachWavePattern(10, 800, 100)})`;
            }
        }

        function toggleBackground() {
            applyBackgroundTheme(currentBgTheme === 'dirt' ? 'water' : 'dirt');
            saveToLocal();
        }

        function getFormattedDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function updateDate() {
            const options = { timeZone: 'Asia/Seoul', year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('dateDisplay').innerText = new Intl.DateTimeFormat('ko-KR', options).format(new Date());
        }
        updateDate();

        function setViewMode(mode) { document.getElementById('mainContainer').className = 'container ' + mode + '-mode'; }

        const fullscreenBtn = document.getElementById('fullscreenBtn');
        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }
        document.addEventListener('fullscreenchange', () => {
            fullscreenBtn.innerText = document.fullscreenElement ? "🖥️ 일반화면" : "🖥️ 전체화면";
        });

        function changeFontSize(step) {
            let currentFontSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--content-font-size')) || 25;
            currentFontSize = Math.max(20, Math.min(65, currentFontSize + step));
            document.documentElement.style.setProperty('--content-font-size', currentFontSize + 'px');
            saveToLocal();
        }

        let modalOkCallback = null;
        function openModal(type, title, desc, onOk) {
            document.getElementById('customModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            
            const inputField = document.getElementById('modalInput');
            inputField.style.display = (type === 'prompt') ? 'block' : 'none';
            inputField.value = '';
            if(type === 'prompt') setTimeout(() => inputField.focus(), 50);
            
            const cancelBtn = document.getElementById('modalCancelBtn');
            cancelBtn.style.display = (type === 'alert') ? 'none' : 'block';

            modalOkCallback = () => { onOk && onOk(inputField.value.trim()); closeModal(); };
        }
        function closeModal() { document.getElementById('customModal').style.display = 'none'; }
        document.getElementById('modalOkBtn').onclick = () => modalOkCallback && modalOkCallback();
        document.getElementById('modalCancelBtn').onclick = closeModal;

        function saveNoticeHistory() {
            const content = document.getElementById('noticeText').value.trim();
            if (!content) {
                openModal('alert', '알림', '저장할 내용이 없습니다.', null);
                return;
            }
            
            const baseDateStr = getFormattedDate();
            let history = JSON.parse(localStorage.getItem('noticeHistory') || '{}');
            
            let maxCount = 0;
            let hasBase = false;

            for (let key in history) {
                if (key === baseDateStr) {
                    hasBase = true;
                } else if (key.startsWith(baseDateStr + ' (')) {
                    let match = key.match(/\((\d+)\)$/);
                    if (match) {
                        let num = parseInt(match[1]);
                        if (num > maxCount) maxCount = num;
                    }
                }
            }

            let saveKey = baseDateStr;

            if (hasBase || maxCount > 0) {
                if (hasBase) {
                    history[`${baseDateStr} (1)`] = history[baseDateStr];
                    delete history[baseDateStr];
                    maxCount = Math.max(maxCount, 1);
                }
                saveKey = `${baseDateStr} (${maxCount + 1})`;
            }
            
            history[saveKey] = content;
            localStorage.setItem('noticeHistory', JSON.stringify(history));
            
            openModal('alert', '저장 완료', `[${saveKey}] 알림장이\n저장되었습니다!`, null);
        }

        function openHistoryModal() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('noticeHistory') || '{}');
            
            const dates = Object.keys(history).sort((a, b) => b.localeCompare(a, undefined, { numeric: true }));

            if (dates.length === 0) {
                historyList.innerHTML = '<p style="text-align:center; color:#888; padding:20px;">저장된 알림장이 없습니다.</p>';
            } else {
                dates.forEach(date => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    const previewText = history[date].replace(/\n/g, ' '); 
                    
                    const textDiv = document.createElement('div');
                    textDiv.style.cssText = 'flex: 1; display: flex; align-items: center; overflow: hidden;';
                    textDiv.innerHTML = `<span class="history-date">${date}</span><span class="history-preview">${previewText}</span>`;
                    
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.innerText = '✖';
                    delBtn.style.marginLeft = '10px';
                    delBtn.title = '삭제';
                    delBtn.onclick = (e) => {
                        e.stopPropagation(); 
                        openModal('confirm', '삭제', `해당 기록을 삭제할까요?`, () => {
                            delete history[date];
                            localStorage.setItem('noticeHistory', JSON.stringify(history));
                            openHistoryModal(); 
                        });
                    };

                    item.appendChild(textDiv);
                    item.appendChild(delBtn);
                    item.onclick = () => { viewHistory(date, history[date]); };
                    
                    historyList.appendChild(item);
                });
            }
            document.getElementById('historyModal').style.display = 'flex';
        }

        function closeHistoryModal() {
            document.getElementById('historyModal').style.display = 'none';
        }

        function viewHistory(date, content) {
            closeHistoryModal(); 
            document.getElementById('viewHistoryTitle').innerText = `${date} 알림장`;
            document.getElementById('viewHistoryContent').value = content;
            
            document.getElementById('btnOverwrite').onclick = () => {
                openModal('confirm', '덮어쓰기', '작성된 알림장 내용을 지우고\n이 내용으로 덮어씁니다.\n계속할까요?', () => {
                    document.getElementById('noticeText').value = content;
                    saveToLocal();
                    closeViewHistoryModal();
                });
            };
            
            document.getElementById('viewHistoryModal').style.display = 'flex';
        }

        function goBackToHistoryModal() {
            document.getElementById('viewHistoryModal').style.display = 'none';
            document.getElementById('historyModal').style.display = 'flex';
        }

        function closeViewHistoryModal() {
            document.getElementById('viewHistoryModal').style.display = 'none';
        }
        // ---------------------------------

        let templateData = { "안전": ["길을 건널 때 좌우 살피기"], "안내장": ["안내장 부모님께 전달하기"], "준비물": ["월요일 실내화"] };
        let currentCategory = "안전"; let currentItem = ""; let lastCursorPosition = null;

        function saveToLocal() {
            const data = {
                notice: document.getElementById('noticeText').value,
                checklist: [...document.querySelectorAll('#checklistContainer .check-item:not(.fixed-end)')].map(item => ({
                    text: item.querySelector('span').innerText.trim(),
                    completed: item.classList.contains('completed')
                })),
                templates: templateData,
                finalMessage: document.querySelector('#finalCheckItem span').innerHTML,
                fontSize: getComputedStyle(document.documentElement).getPropertyValue('--content-font-size'), 
                bgTheme: currentBgTheme
            };
            localStorage.setItem('classQuestData', JSON.stringify(data));
        }

        function renderCustomSelect(containerId, optionsList, selectedValue, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const header = document.createElement('div');
            header.className = 'custom-select-header';
            const headerText = document.createElement('span');
            headerText.className = 'custom-select-header-text';
            headerText.textContent = selectedValue || '선택';
            header.appendChild(headerText);
            const list = document.createElement('div');
            list.className = 'custom-select-list';
            optionsList.forEach(opt => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'custom-select-item';
                itemDiv.innerHTML = `<span>${opt}</span>`;
                itemDiv.onmousedown = (e) => {
                    e.preventDefault(); 
                    if (type === 'category') { currentCategory = opt; currentItem = templateData[opt][0] || ""; }
                    else { currentItem = opt; }
                    updateAllSelects();
                    container.classList.remove('open');
                };
                const delBtn = document.createElement('button');
                delBtn.className = 'custom-del-btn'; delBtn.textContent = '✖';
                delBtn.onmousedown = (e) => {
                    e.stopPropagation(); e.preventDefault();
                    if (type === 'category') deleteCategory(opt); else deleteTemplateItem(currentCategory, opt);
                };
                itemDiv.appendChild(delBtn);
                list.appendChild(itemDiv);
            });
            const addDiv = document.createElement('div');
            addDiv.className = 'custom-add-btn'; addDiv.textContent = '➕ 추가...';
            addDiv.onmousedown = (e) => { e.preventDefault(); if (type === 'category') addNewCategory(); else addNewItem(currentCategory); };
            list.appendChild(addDiv);
            header.onclick = (e) => {
                e.stopPropagation();
                document.querySelectorAll('.custom-select-container').forEach(c => c !== container && c.classList.remove('open'));
                container.classList.toggle('open');
            };
            container.appendChild(header); container.appendChild(list);
        }

        document.addEventListener('mousedown', (e) => { if (!e.target.closest('.custom-select-container')) { document.querySelectorAll('.custom-select-container').forEach(c => c.classList.remove('open')); } });

        function updateAllSelects() {
            const categories = Object.keys(templateData);
            if (!currentCategory || !categories.includes(currentCategory)) currentCategory = categories[0] || "";
            renderCustomSelect('categorySelectContainer', categories, currentCategory, 'category');
            const items = templateData[currentCategory] || [];
            if (!currentItem || !items.includes(currentItem)) currentItem = items[0] || "";
            renderCustomSelect('itemSelectContainer', items, currentItem, 'item');
        }

        function addNewCategory() { openModal('prompt', '새 카테고리', '내용 입력하기', (val) => { if(val && !templateData[val]) { templateData[val] = []; currentCategory = val; updateAllSelects(); saveToLocal(); } }); }
        function addNewItem(cat) { openModal('prompt', '새 항목', '내용 입력하기', (val) => { if(val && !templateData[cat].includes(val)) { templateData[cat].push(val); currentItem = val; updateAllSelects(); saveToLocal(); } }); }
        function deleteCategory(cat) { openModal('confirm', '경고', `[${cat}]의 모든 내용이 삭제됩니다.`, () => { delete templateData[cat]; currentCategory = ""; updateAllSelects(); saveToLocal(); }); }
        function deleteTemplateItem(cat, item) { templateData[cat] = templateData[cat].filter(i => i !== item); updateAllSelects(); saveToLocal(); }

        const noticeArea = document.getElementById('noticeText');
        function renumberNoticeText() {
            let lines = noticeArea.value.split('\n');
            let num = 1;
            noticeArea.value = lines.map(line => {
                const match = line.match(/^\s*\d+\.\s*(.*)/);
                return match ? `${num++}. ${match[1].trim()}` : line;
            }).join('\n');
        }
        noticeArea.addEventListener('mouseup', () => { lastCursorPosition = noticeArea.selectionStart; if(noticeArea.selectionStart === noticeArea.selectionEnd) { renumberNoticeText(); saveToLocal(); } });
        noticeArea.onblur = () => { renumberNoticeText(); saveToLocal(); };

        function appendNotice() {
            if(!currentItem) return;
            let text = noticeArea.value;
            const insert = `1. ${currentItem}`;
            if (lastCursorPosition !== null) {
                let pre = text.substring(0, lastCursorPosition);
                let post = text.substring(lastCursorPosition);
                const p = (pre.length > 0 && !pre.endsWith('\n')) ? '\n' : '';
                const s = (post.length > 0 && !post.startsWith('\n')) ? '\n' : '';
                noticeArea.value = pre + p + insert + s + post;
            } else { noticeArea.value += (text.length > 0 && !text.endsWith('\n') ? '\n' : '') + insert; }
            renumberNoticeText(); saveToLocal(); noticeArea.focus();
        }
        function clearNotice() { openModal('confirm', '초기화', '내용을 전부 지울까요?', () => { noticeArea.value = ''; saveToLocal(); }); }

        function enterEditMode(span) { span.contentEditable = "true"; span.focus(); }
        function exitEditMode(span) { span.contentEditable = "false"; window.getSelection().removeAllRanges(); saveToLocal(); }
        function preventEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); e.target.blur(); } }
        function toggleCheck(box) { box.parentElement.classList.toggle('completed'); saveToLocal(); }
        function deleteItem(btn) { btn.parentElement.remove(); saveToLocal(); }

        const checklist = document.getElementById('checklistContainer');
        const placeholder = document.createElement('div'); placeholder.className = 'drag-placeholder';
        let dragged = null;
        function addDragEvents(item) {
            item.ondragstart = function(e) { if(this.querySelector('span').contentEditable === "true") { e.preventDefault(); return; } dragged = this; setTimeout(() => { this.style.display='none'; this.parentNode.insertBefore(placeholder, this.nextSibling); }, 0); };
            item.ondragend = function() { if(dragged) { dragged.style.display='flex'; placeholder.parentNode.insertBefore(dragged, placeholder); dragged = null; } placeholder.remove(); saveToLocal(); };
        }
        checklist.ondragover = function(e) { e.preventDefault(); if(!dragged) return; const after = getAfter(this, e.clientY); if(!after) this.insertBefore(placeholder, document.getElementById('finalCheckItem')); else this.insertBefore(placeholder, after); };
        function getAfter(container, y) {
            const els = [...container.querySelectorAll('.check-item:not(.fixed-end)')].filter(el => el !== dragged && el !== placeholder);
            return els.reduce((closest, child) => { const box = child.getBoundingClientRect(); const offset = y - box.top - box.height / 2; if(offset < 0 && offset > closest.offset) return { offset: offset, element: child }; else return closest; }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function addCheckItem(text = null, comp = false) {
            const input = document.getElementById('newCheckInput');
            const val = text || input.value.trim(); if (!val) return;
            const newItem = document.createElement('div'); newItem.className = 'check-item' + (comp ? ' completed' : ''); newItem.draggable = true;
            newItem.innerHTML = `<div class="check-box" onclick="toggleCheck(this)"></div><span onclick="enterEditMode(this)" onblur="exitEditMode(this)" onkeydown="preventEnter(event)" spellcheck="false">${val}</span><button class="delete-btn" onclick="deleteItem(this)">✖</button>`;
            addDragEvents(newItem); checklist.insertBefore(newItem, document.getElementById('finalCheckItem'));
            if(!text) { input.value = ''; saveToLocal(); }
        }

        function loadFromLocal() {
            const saved = localStorage.getItem('classQuestData');
            if (saved) {
                const data = JSON.parse(saved);
                if (data.templates) templateData = data.templates;
                if (data.finalMessage) document.querySelector('#finalCheckItem span').innerHTML = data.finalMessage;

                if (data.bgTheme) {
                    applyBackgroundTheme(data.bgTheme);
                } else {
                    applyBackgroundTheme('dirt');
                }

                if (data.fontSize) {
                    document.documentElement.style.setProperty('--content-font-size', data.fontSize);
                }

                noticeArea.value = data.notice || "";
                if (data.checklist && data.checklist.length > 0) {
                    data.checklist.forEach(i => addCheckItem(i.text, i.completed));
                } else {
                    defCheck();
                }
            } else {
                applyBackgroundTheme('dirt');
                defCheck();
            }
            updateAllSelects();
        }

        function defCheck() { addCheckItem("미니 빗자루로 책상 아래 쓸기"); addCheckItem("책상 서랍 정리하기"); addCheckItem("교과서 사물함에 세워서 꽂아두기"); }
        loadFromLocal();
    </script>
</body>
</html>
