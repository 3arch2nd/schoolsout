<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👾 우리반 하교 퀘스트</title>
    <style>
        @font-face {
            font-family: 'NeoDunggeunGothicPro';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.0/NeoDunggeunmoPro-Regular.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }

        :root {
            --content-font-size: 25px; 
        }

        * {
            box-sizing: border-box;
            font-family: 'NeoDunggeunGothicPro', sans-serif;
        }
        
        body {
            background-color: #8b5a2b; 
            margin: 0;
            padding: 50px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            overflow: hidden; 
        }

        .grass-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 100px; 
            z-index: -1;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        button, input[type="text"] {
            font-size: 14px; 
            padding: 6px 12px; 
            background-color: #e0e0e0;
            border: 3px solid #000;
            box-shadow: inset -3px -3px 0px rgba(0,0,0,0.2), inset 3px 3px 0px rgba(255,255,255,0.7);
            cursor: pointer;
            outline: none;
            transition: background-color 0.2s;
        }
        button:active {
            box-shadow: inset 3px 3px 0px rgba(0,0,0,0.2);
            padding: 8px 10px 4px 14px;
        }
        
        .btn-fullscreen { background-color: #55ffff; }
        .btn-font { background-color: #ffff55; font-weight: bold; }

        .container {
            display: flex;
            flex: 1;
            transition: gap 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            min-height: 0; 
            min-width: 0;
        }
        
        .container.split-mode { gap: 20px; }
        .container.notice-mode { gap: 0px; }
        .container.checklist-mode { gap: 0px; }

        .section {
            background-color: #f9f9f9; 
            border: 5px solid #333;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden; 
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            min-height: 0; 
            min-width: 0;  
        }

        .split-mode .section { flex: 1; padding: 15px; border-width: 5px; opacity: 1; }
        .notice-mode .notice-section { flex: 1; padding: 15px; border-width: 5px; opacity: 1; }
        .notice-mode .checklist-section { flex: 0; padding: 0; border-width: 0; margin: 0; opacity: 0; }
        .checklist-mode .checklist-section { flex: 1; padding: 15px; border-width: 5px; opacity: 1; }
        .checklist-mode .notice-section { flex: 0; padding: 0; border-width: 0; margin: 0; opacity: 0; }

        h2 {
            text-align: center; margin: 0 0 10px 0; padding-bottom: 10px;
            border-bottom: 3px solid #ccc; color: #222;
            font-size: calc(var(--content-font-size) * 1.2);
            transition: font-size 0.2s ease; white-space: nowrap; 
        }

        .date-display {
            font-weight: normal; text-align: center; margin-bottom: 10px; color: #0000aa;
            font-size: calc(var(--content-font-size) * 1.2); transition: font-size 0.2s ease;
        }

        textarea.notice-content {
            width: 100%; flex: 1; resize: none; background-color: #fff; border: 3px solid #888;
            padding: 15px; line-height: 1.6; font-size: calc(var(--content-font-size) * 1.2);
            transition: font-size 0.2s ease; min-height: 0; 
        }
        
        .admin-controls {
            margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px;
            align-items: stretch; background: #e9e9e9; padding: 10px; border: 3px solid #888;
        }

        .custom-select-container {
            position: relative; font-size: 1.1rem; user-select: none; z-index: 10;
        }
        
        .custom-select-header {
            background: #fff; border: 3px solid #888; padding: 8px 12px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            height: 4.5rem; box-sizing: border-box;
        }
        .custom-select-header::after { content: '▲'; font-size: 0.8rem; margin-left: 10px; color: #555; flex-shrink: 0; }

        .custom-select-header-text {
            flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis; line-height: 1.4; word-break: keep-all; 
        }
        
        .custom-select-list {
            position: absolute; bottom: calc(100% - 3px); left: 0; right: 0;
            background: #fff; border: 3px solid #888; z-index: 1000; 
            max-height: 250px; overflow-y: auto; box-shadow: 4px -4px 0px rgba(0,0,0,0.2); 
            display: none;
        }
        .custom-select-container.open .custom-select-list { display: block; }
        
        .custom-select-item {
            padding: 10px 12px; border-bottom: 2px dashed #eee; display: flex;
            justify-content: space-between; align-items: center; cursor: pointer; font-size: 1.1rem;
        }
        .custom-select-item:hover { background: #f0f0f0; }
        .custom-select-item span { flex: 1; pointer-events: none; } 
        
        .custom-del-btn, .delete-btn {
            background: none; border: none; box-shadow: none;
            color: #aaaaaa; cursor: pointer; padding: 0 5px; font-size: 1.3rem;
        }
        .custom-del-btn:hover, .delete-btn:hover { color: #888888; transform: scale(1.2); }
        
        .custom-add-btn {
            padding: 12px; text-align: center; color: #0000aa; font-weight: bold; cursor: pointer; font-size: 1.1rem;
            border-top: 2px solid #888; background: #f9f9ff;
        }
        .custom-add-btn:hover { background: #eef; }

        .btn-clear { background-color: #ffaaaa; color: #cc0000; font-weight: bold; }

        .checklist-items { display: flex; flex-direction: column; gap: 10px; flex: 1; min-height: 0; }

        .check-item {
            display: flex; align-items: center; background-color: #fff; border: 3px solid #555;
            padding: 10px; font-size: var(--content-font-size); transition: font-size 0.2s ease; cursor: grab; 
        }
        .check-item:active { cursor: grabbing; } 

        .check-box {
            width: 24px; height: 24px; border: 3px solid #000; background-color: #eee; margin-right: 15px;
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem; color: #ff5555;
            flex-shrink: 0; cursor: pointer; 
        }

        .check-item span {
            flex: 0 1 auto; min-width: 50px; padding: 2px 5px; outline: none; border-bottom: 2px solid transparent; cursor: text;
        }
        .check-item span[contenteditable="true"] {
            border-bottom: 2px dashed #ffaa00; background-color: rgba(0,0,0,0.05);
            text-decoration: none !important; color: #000 !important; cursor: text;
        }

        .delete-btn { margin-left: auto; } 
        .check-item.completed .check-box::after { content: '✔'; }
        .check-item.completed span { text-decoration: line-through; color: #999; }

        .check-item.fixed-end {
            display: block; text-align: center; background-color: #ffaa00; border-color: #aa0000;
            font-weight: normal; color: #fff; text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            margin-top: auto; cursor: default; font-size: calc(var(--content-font-size) * 1.2);
            line-height: 1.4; padding: 15px;
        }
        
        .check-item.fixed-end span { display: inline-block; cursor: text; padding: 5px; border-bottom: 2px solid transparent; min-width: 200px; }
        .check-item.fixed-end span[contenteditable="true"] { border-bottom: 2px dashed #fff; background-color: rgba(0,0,0,0.2); text-shadow: none; color: #fff !important; }

        .add-checklist { display: flex; gap: 5px; margin-bottom: 10px; }
        .add-checklist input { flex: 1; }

        .drag-placeholder { height: 6px; background-color: #888888; border-radius: 3px; margin: 2px 0; pointer-events: none; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .modal-box { background: #f9f9f9; border: 5px solid #333; box-shadow: 6px 6px 0px rgba(0,0,0,0.5); padding: 20px; width: 400px; max-width: 90%; text-align: center; }
        .modal-box h3 { margin-top: 0; font-size: 1.5rem; border-bottom: 3px dashed #ccc; padding-bottom: 10px; }
        .modal-box p { font-size: 1.1rem; color: #333; margin-bottom: 15px; line-height: 1.5; }
        .modal-box input { width: 100%; margin-bottom: 20px; font-size: 1.2rem; text-align: center; padding: 10px; border: 3px solid #888; }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-buttons button { flex: 1; font-size: 1.2rem; padding: 15px 20px; min-height: 55px; }

        @media (max-width: 768px) { .container { flex-direction: column; } .split-mode .section { width: 100%; flex: 1; } }
    </style>
</head>
<body>

    <div id="customModal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3 id="modalTitle">제목</h3>
            <p id="modalDesc"></p>
            <input type="text" id="modalInput">
            <div class="modal-buttons">
                <button id="modalOkBtn" style="background-color: #55ff55;">확인</button>
                <button id="modalCancelBtn" style="background-color: #ffaaaa;">취소</button>
            </div>
        </div>
    </div>

    <div class="grass-top"></div>

    <div class="controls">
        <button onclick="setViewMode('split')">📖 둘 다 보기</button>
        <button onclick="setViewMode('notice')">📝 알림장</button>
        <button onclick="setViewMode('checklist')">✅ 체크리스트</button>
        <button id="fullscreenBtn" class="btn-fullscreen" onclick="toggleFullScreen()">🖥️ 전체화면</button>
        <button class="btn-font" onclick="changeFontSize(-2)">-가</button>
        <button class="btn-font" onclick="changeFontSize(2)">+가</button>
    </div>

    <div class="container split-mode" id="mainContainer">
        <div class="section notice-section">
            <h2>📢 오늘의 알림장</h2>
            <div class="date-display" id="dateDisplay"></div>
            <textarea class="notice-content" id="noticeText"></textarea>
            <div class="admin-controls">
                <div id="categorySelectContainer" class="custom-select-container" style="flex: 1; min-width: 120px;"></div>
                <div id="itemSelectContainer" class="custom-select-container" style="flex: 2; min-width: 180px;"></div>
                <button onclick="appendNotice()" style="margin-left:auto; padding: 10px 15px;">➕ 덧붙이기</button>
                <button class="btn-clear" onclick="clearNotice()" title="초기화" style="padding: 10px 15px;">초기화</button>
            </div>
        </div>

        <div class="section checklist-section">
            <h2>✅ 확인했나요?</h2>
            <div class="add-checklist">
                <input type="text" id="newCheckInput" placeholder="오늘의 퀘스트 입력" onkeypress="if(event.key==='Enter') addCheckItem()">
                <button onclick="addCheckItem()">➕ 추가</button>
            </div>
            <div class="checklist-items" id="checklistContainer">
                <div class="check-item fixed-end" id="finalCheckItem">
                    <span onclick="enterEditMode(this)" onblur="exitEditMode(this)" onkeydown="preventEnter(event)" spellcheck="false" contenteditable="false">모두 완료한 사람은<br>선생님께 인사 드리고 하교하기!</span>
                </div>
            </div>
        </div>
    </div>
